<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSN iSync - Download</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 440px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #e2e8f0;
            padding: 4rem 2rem;
            border-radius: 32px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin: 0 0 2rem 0;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            background: var(--primary);
            color: white;
            padding: 1.25rem 2.5rem;
            border-radius: 99px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            background: var(--primary-hover);
            box-shadow: 0 15px 30px -5px rgba(37, 99, 235, 0.4);
        }

        .version {
            font-size: 0.9rem;
            margin-top: 2rem;
            font-weight: 400;
            color: var(--text-muted);
        }

        .version strong {
            color: var(--text);
            font-weight: 600;
        }

        .github-link {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
        }

        .github-link a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            padding: 0.5rem 1rem;
            border-radius: 99px;
            background: rgba(0,0,0,0.03);
        }

        .github-link a:hover {
            color: var(--primary);
            background: rgba(37, 99, 235, 0.05);
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #94a3b8;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .footer .name {
            color: var(--primary);
            text-shadow: 0 0 15px rgba(37, 99, 235, 0.2);
            position: relative;
        }

        .footer .name::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 1.5px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>BSN iSync</h1>
            
            <a id="download-btn" href="https://github.com/ngtuonghy/bsn_isync/releases/latest" class="btn">
                <span>Tải xuống cho Windows</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </a>

            <div class="version">Phiên bản mới nhất: <strong id="latest-version">v0.1.20</strong></div>

            <div class="github-link">
                <a href="https://github.com/ngtuonghy/bsn_isync" target="_blank">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                    <span>Xem trên GitHub</span>
                </a>
            </div>
        </div>
        <div class="footer">
            <span>Product by</span>
            <span class="name">ngtuonghy</span>
        </div>
    </div>

    <script>
        async function updateLatestRelease() {
            const btn = document.getElementById('download-btn');
            const versionEl = document.getElementById('latest-version');
            
            try {
                const response = await fetch('https://api.github.com/repos/ngtuonghy/bsn_isync/releases/latest');
                if (!response.ok) return;
                
                const data = await response.json();
                const version = data.tag_name;
                const assets = data.assets;
                
                // Find the Windows .exe installer
                const windowsAsset = assets.find(asset => asset.name.endsWith('.exe'));
                
                if (windowsAsset) {
                    btn.href = windowsAsset.browser_download_url;
                }
                
                if (version) {
                    versionEl.textContent = version;
                }
            } catch (error) {
                console.error('Failed to fetch latest release:', error);
            }
        }
        
        updateLatestRelease();
    </script>
</body>
</html>
